name: Generate F&O Analysis Report

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI

env:
  GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
  GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create Output directory
        run: mkdir -p Output data
      
      - name: Run F&O Analysis (Premarket)
        run: |
          python run_analysis.py premarket
        continue-on-error: true
      
      - name: Check for generated files
        run: |
          echo "Files in Output directory:"
          ls -lh Output/ || echo "Output directory is empty"
          echo ""
          echo "Files in data directory:"
          ls -lh data/ || echo "Data directory is empty"
      
      - name: Upload PDF to Google Drive
        run: |
          python upload_to_gdrive.py
        continue-on-error: true
        if: env.GDRIVE_CREDENTIALS != '' && env.GDRIVE_FOLDER_ID != ''
      
      - name: List all generated files
        run: |
          echo "=== Final Directory Structure ==="
          find . -name "*.pdf" -o -name "market_data.json" | head -20
