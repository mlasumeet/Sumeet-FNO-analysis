name: Generate F&O Analysis Report

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create Output directory
        run: mkdir -p Output data
      
      - name: Run F&O Analysis (Premarket)
        run: |
          python run_analysis.py premarket
        continue-on-error: true
      
      - name: Check for generated files
        run: |
          echo "Files in Output directory:"
          ls -lh Output/ || echo "Output directory is empty"
          echo ""
          echo "Files in data directory:"
          ls -lh data/ || echo "Data directory is empty"
      
      - name: Commit and Push Output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --cached --name-only
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "Generated F&O Analysis Report - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Changes committed and pushed successfully!"
          else
            echo "⚠️ No changes to commit"
          fi
        continue-on-error: true
      
      - name: List all generated files
        run: |
          echo "=== Final Directory Structure ==="
          find . -name "*.pdf" -o -name "market_data.json" | head -20
